<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Syllabus Planner - Premium Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3B82F6",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0F172A",
                        "surface-dark": "#1E293B",
                        "input-dark": "#0F172A",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.25rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            min-height: 100dvh;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-slate-100 flex flex-col items-center justify-center p-6 relative overflow-hidden">
<div class="fixed -top-24 -left-24 w-80 h-80 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed -bottom-24 -right-24 w-80 h-80 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed top-0 left-0 w-full h-12 flex justify-between items-center px-8 opacity-60 z-50">
<span class="text-sm font-semibold">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<div class="w-full max-w-[400px] flex flex-col items-center z-10">
<div class="text-center flex flex-col items-center mb-10">
<div class="w-20 h-20 bg-primary/10 rounded-[22px] flex items-center justify-center mb-6 border border-white/10 shadow-2xl">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1">school</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white mb-2">Syllabus Planner</h1>
<p class="text-slate-400 font-medium">Elevate your academic workflow</p>
</div>
<div class="w-full bg-surface-dark/80 ios-blur p-8 rounded-[28px] shadow-2xl border border-white/10">
<form class="space-y-6">
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-wider text-slate-400 ml-1">Email Address</label>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-slate-500 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-input-dark border border-slate-700/50 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-white placeholder:text-slate-600" placeholder="name@university.edu" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold uppercase tracking-wider text-slate-400">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Forgot?</a>
</div>
<div class="relative flex items-center group">
<span class="material-symbols-outlined absolute left-4 text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-input-dark border border-slate-700/50 rounded-2xl focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-white placeholder:text-slate-600" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 text-slate-500 cursor-pointer hover:text-slate-300 transition-colors">visibility</span>
</div>
</div>
<button class="w-full h-14 bg-primary hover:bg-blue-500 text-white font-bold rounded-2xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-2 active:scale-[0.98]" type="submit">
                    Sign In
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-700/50"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-surface-dark px-4 text-slate-500 font-bold tracking-[0.2em]">or</span>
</div>
</div>
<div class="pb-2">
<button class="w-full h-14 flex items-center justify-center gap-3 bg-white/[0.03] border border-white/10 hover:bg-white/[0.06] rounded-2xl transition-all font-semibold text-slate-200 active:scale-[0.98]">
<svg class="w-5 h-5" viewBox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Continue with Google
                </button>
</div>
</div>
<p class="text-sm text-slate-500 mt-8">
            Don't have an account? 
            <a class="text-primary font-bold hover:underline ml-1" href="#">Sign up for free</a>
</p>
</div>

</body></html>
